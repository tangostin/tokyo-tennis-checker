name: Tennis Checker

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm init -y

      - run: npm install playwright

      - run: |
          node -e "
          console.log('Playwright installed');
          "
